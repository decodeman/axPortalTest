name: deployMe test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# permissions:
#   contents: read

# env:
#   BUILD_CONFIGURATION: Release

jobs:
  deploy:  
    runs-on: [self-hosted, axcelus-portal-dev]
    container:
      image: artifactory.msp.ssncad.global/devx-docker-rel-local/pipeline/gitlabci/ssc-cloud-cli:1.5
      options: "--add-host=code.ssnc.dev:100.100.128.20"

    steps:
      - name: Checkout repo (needed for cicd/ansible)
        uses: actions/checkout@v4
    
      - name: Prepare SSH known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H 10.102.8.28 >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Debug SSH key used by runner
        run: |
          echo "Keys loaded in ssh-agent:"
          ssh-add -L || true

      - name: Install ansible
        run: apt-get update && apt-get install -y ansible

      - name: Run ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          cd cicd/ansible
          ansible-playbook -i "10.102.8.28," -u cloud-runner deploy.yml \
            -e "app_name=axPortalTest"

